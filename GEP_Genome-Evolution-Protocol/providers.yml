providers:

  - id: cerebras_phase1
    name: "Cerebras/qwen3-235b"
    phase: phase1
    priority: 1
    base_url: "https://api.cerebras.ai/v1"
    model: "qwen-3-235b-a22b-instruct-2507"
    env_var: CEREBRAS_API_KEY
    thinking_mode:
      supported: false
      style: none
    limits:
      tpd: 1000000   # Free tier: 1M tokens/day
      tpm: 60000     # Free tier: 60k tokens/min
      rpm: 30        # Free tier: 30 requests/min
      # Paid tier example (uncomment if using paid):
      # tpd: null
      # tpm: 500000   # Paid tier: 500k tokens/min
      # rpm: 500     # Paid tier: 500 requests/min

  - id: groq_phase2
    name: "Groq/qwen-qwq-32b"
    phase: phase2
    priority: 1
    base_url: "https://api.groq.com/openai/v1"
    model: "qwen-qwq-32b"
    env_var: GROQ_API_KEY
    thinking_mode:
      supported: false
      style: none
    limits:
      tpd: null
      tpm: 60000
      rpd: 500
      rpm: 30

  - id: local_phase1
    name: "Local/qwen3:4b"
    phase: phase1
    priority: 99
    base_url: "http://localhost:11434/v1"
    model: "qwen3:4b"
    env_var: OLLAMA_DUMMY_KEY
    thinking_mode:
      supported: false
      style: none
    limits:
      tpd: null
      rpd: null
      rpm: null

  - id: local_phase2
    name: "Local/qwen3:14b"
    phase: phase2
    priority: 99
    base_url: "http://localhost:11434/v1"
    model: "qwen3:14b"
    env_var: OLLAMA_DUMMY_KEY
    thinking_mode:
      supported: false
      style: none
    limits:
      tpd: null
      rpd: null
      rpm: null

settings:
  daily_token_tracking: true
  daily_counter_path: ".gep_daily_tokens.json"
  max_retries: 2
  retry_delay_s: 5
  swap_on_429: true
  skip_at_percent: 95
  warn_at_percent: 80